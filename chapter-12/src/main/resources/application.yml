server:
  tomcat:
    threads:
      # With virtual threads enabled (chapter 11), the platform-thread pool
      # only carries virtual threads. Keep it small: sized to ~2× core count.
      max: 16
      min-spare: 4
    # accept-count + max defines how much load Tomcat will absorb before
    # rejecting new connections at the OS level. Larger queues hide saturation;
    # 100 is the chapter 25 sweet-spot for this service.
    accept-count: 100
    connection-timeout: 5000

spring:
  threads:
    virtual:
      # Enables virtual threads for the embedded Tomcat connector, @Async
      # executors, and the scheduler. With this flag, every request runs on a
      # virtual thread carried by a small pool of platform threads: measured
      # against the chapter-01 baseline this lifts throughput on I/O-bound
      # endpoints by ~2-3× without changing application code.
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cinetrack}
    username: ${DB_USER:cinetrack}
    password: ${DB_PASS:cinetrack}
    hikari:
      maximum-pool-size: 5  # formula: (vCPU × 2) + 1 for a 2-CPU container
      minimum-idle: 2
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CineTrackPool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: caffeine
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: cinetrack
    distribution:
      # Publish percentile-buckets so Prometheus can compute aggregated quantiles
      # over rolling windows (avoids the "averages of percentiles" trap covered in 2.6).
      percentiles-histogram:
        http.server.requests: true
        cinetrack.tmdb.lookup: true
      # Per-meter SLO buckets: make these align with your actual latency budgets.
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s
        cinetrack.tmdb.lookup: 50ms,100ms,250ms,500ms,1s,2s
      # Client-side percentiles for dashboards that don't aggregate across instances.
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        cinetrack.tmdb.lookup: 0.5, 0.95, 0.99

jwt:
  # Set JWT_SECRET environment variable (minimum 256-bit entropy, base64-encoded)
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

tmdb:
  base-url: ${TMDB_BASE_URL:https://api.themoviedb.org/3}
  api-key: ${TMDB_API_KEY:}

rate-limit:
  capacity: 100
  refill-tokens: 100
  refill-period-seconds: 60
