# Chapter 22.6 — PgBouncer in front of HikariCP.
#
# PgBouncer multiplexes many short-lived application connections onto a small
# pool of long-lived Postgres backends. With this setup, the Spring Boot pool
# (16 connections per app instance) lands on a much smaller server-side pool
# (~25 backends total), freeing memory and CPU on Postgres.
#
# Run: docker compose -f docker-compose.pgbouncer.yml up
# Connect Spring Boot to PgBouncer at localhost:6432 instead of postgres:5432.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cinetrack
      POSTGRES_PASSWORD: cinetrack
      POSTGRES_DB: cinetrack
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cinetrack
      DB_PASSWORD: cinetrack
      DB_NAME: cinetrack
      # Transaction mode — connection is returned to the pool at the end of
      # every transaction, not at the end of the session. Trade-off: prepared
      # statements and SET LOCAL don't work in transaction mode (22.6).
      POOL_MODE: transaction
      # Server-side pool size — what PgBouncer keeps open against Postgres.
      # Small intentionally; this is the ceiling for true concurrent queries.
      DEFAULT_POOL_SIZE: 25
      MAX_CLIENT_CONN: 1000
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
    ports:
      - "6432:5432"
    depends_on:
      - postgres

volumes:
  pg_data:
