# Local infra for running CinéTrack from the chapter-1 baseline. Spin this up
# before mvn spring-boot:run.
#
#   docker compose up -d
#   mvn spring-boot:run
#   curl http://localhost:8080/actuator/health
#
# Mailhog provides a no-config SMTP catch-all on :1025 for the @Async
# notification path; its UI is on :8025.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cinetrack
      POSTGRES_PASSWORD: cinetrack
      POSTGRES_DB: cinetrack
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinetrack"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "51025:1025"   # SMTP
      - "58025:8025"   # web UI
