spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cinetrack}
    username: ${DB_USER:cinetrack}
    password: ${DB_PASS:cinetrack}
    hikari:
      maximum-pool-size: 5  # formula: (vCPU × 2) + 1 for a 2-CPU container
      minimum-idle: 2
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CineTrackPool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: caffeine
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: cinetrack

jwt:
  # Set JWT_SECRET environment variable (minimum 256-bit entropy, base64-encoded)
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

tmdb:
  base-url: ${TMDB_BASE_URL:https://api.themoviedb.org/3}
  api-key: ${TMDB_API_KEY:}

rate-limit:
  capacity: 100
  refill-tokens: 100
  refill-period-seconds: 60
